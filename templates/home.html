<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi Seva</title>
    <link rel="icon" href="../static/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="../static/images/logo.svg" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Krishi Seva
          </a>
        </div>
    </nav>

    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
              <div class="carousel-text-wrapper">
                
               <!-- =========== WEATHER CARD ============ -->
<div class="weather-card bg-light p-3 rounded mb-4" style="width: 350px; margin:auto;">
    <h4>🌦️ Weather Forecast</h4>
    <p id="weather-status">Getting your location...</p>
    <p id="weather-temp"></p>
    <p id="weather-rain"></p>
</div>
                <!-- ===================================== -->

                <h1 class="carousel-text-title">Crop Disease Recognition</h1>

                <div class="form-box">
                  <form action="/upload/" method="POST" enctype="multipart/form-data">
                    <h1>Upload Image</h1>
                    <div class="input-box d-flex">
                      <input type="file" accept="image/png, image/jpeg" name="img" required>
                    </div>
                    <div class="input-box d-flex">
                      <button type="submit" class="btn btn-success m-auto">Upload</button>
                    </div>
                  </form>

                  {% if result %}
                  <div class="result-container">
                    <div class="result-box">
                      <div class="result-img-container">
                        <img src="{{imagepath}}" alt="uploaded image" class="result-image">
                      </div>
                      <div class="result-text">
                        <h3>{{prediction['name']}}</h3>
                        <p>{{prediction['cause']}}</p>
                        <p>{{prediction['cure']}}</p>
                      </div>
                    </div>
                  </div>
                {% endif %}
                </div>

              </div>
            </div>
        </div>
    </div>

    <script src="../static/js/bootstrap.bundle.min.js"></script>

<!-- ========== WEATHER SCRIPT ========== -->
<script>
    // Step 1: Get GPS location
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(success, error);
    } else {
        document.getElementById("weather-status").innerHTML = "GPS not supported";
    }

    function success(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        document.getElementById("weather-status").innerHTML = "Fetching weather...";

        // Step 2: Send GPS to backend
        fetch(`/weather?lat=${lat}&lon=${lon}`)
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    document.getElementById("weather-status").innerHTML = "Error: " + data.message;
                    document.getElementById("weather-temp").innerHTML = "";
                    document.getElementById("weather-rain").innerHTML = "";
                    return;
                }

                document.getElementById("weather-status").innerHTML = "Location: " + data.location;
                document.getElementById("weather-temp").innerHTML = "Temperature: " + data.temp + "°C";
                document.getElementById("weather-rain").innerHTML = "Condition: " + data.description;
            })
            .catch(err => {
                document.getElementById("weather-status").innerHTML = "Failed to fetch weather";
                document.getElementById("weather-temp").innerHTML = "";
                document.getElementById("weather-rain").innerHTML = "";
            });
    }

    function error() {
        document.getElementById("weather-status").innerHTML = "Unable to get location";
        document.getElementById("weather-temp").innerHTML = "";
        document.getElementById("weather-rain").innerHTML = "";
    }
</script>
<!-- =================================== -->

</body>
</html>
